<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktivér konto · Circulus Aureus</title>
  <meta name="theme-color" content="#16050b" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #16050b;
      --panel: rgba(60, 13, 28, 0.86);
      --panel-2: rgba(78, 18, 36, 0.95);
      --gold: #d7b46a;
      --text: #f8efe4;
      --muted: #d7cabf;
      --line: rgba(215, 180, 106, 0.18);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-pill: 999px;
      --danger: #ffb4b4;
      --danger-bg: rgba(120, 20, 20, 0.35);
      --ok: #d7f7cf;
      --ok-bg: rgba(25, 80, 30, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 18%, rgba(143, 34, 60, 0.18), transparent 34%),
        linear-gradient(180deg, #16050b 0%, #0d0206 100%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(100%, 720px);
      border-radius: 40px;
      padding: 34px 22px 28px;
      text-align: center;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      box-shadow: var(--shadow), inset 0 0 28px rgba(215, 180, 106, 0.06);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--gold);
      font-family: Cinzel, serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 14px;
    }

    h1 {
      margin: 0 0 16px;
      font-family: Cinzel, serif;
      font-size: clamp(34px, 8vw, 60px);
      line-height: 1.06;
      font-weight: 600;
    }

    .lead {
      margin: 0 auto 26px;
      max-width: 560px;
      color: var(--muted);
      line-height: 1.55;
      font-size: clamp(18px, 3.2vw, 22px);
    }

    form {
      display: grid;
      gap: 14px;
      text-align: left;
      margin-top: 10px;
    }

    .field-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 18px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font: inherit;
      outline: none;
      min-height: 58px;
    }

    input::placeholder {
      color: #d7cabf;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      border-radius: var(--radius-pill);
      padding: 18px 30px;
      font-family: Cinzel, serif;
      font-size: 18px;
      background: var(--gold);
      color: #2a1809;
      margin-top: 8px;
      min-height: 58px;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .status {
      margin-top: 18px;
      line-height: 1.5;
      min-height: 28px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid transparent;
      display: none;
      text-align: left;
    }

    .status.show {
      display: block;
    }

    .status.info {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--line);
      color: var(--muted);
    }

    .status.error {
      background: var(--danger-bg);
      border-color: rgba(255, 180, 180, 0.25);
      color: var(--danger);
    }

    .status.success {
      background: var(--ok-bg);
      border-color: rgba(215, 247, 207, 0.22);
      color: var(--ok);
    }

    .small {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <section class="card">
    <p class="eyebrow">Circulus Aureus</p>
    <h1>Opret adgangskode</h1>
    <p class="lead">
      Din invitation er fundet. Vælg nu en adgangskode for at aktivere din konto.
    </p>

    <form id="invite-form" novalidate>
      <div>
        <div class="field-label">Adgangskode</div>
        <input id="password" type="password" placeholder="Vælg adgangskode" autocomplete="new-password" required />
      </div>

      <div>
        <div class="field-label">Gentag adgangskode</div>
        <input id="password2" type="password" placeholder="Gentag adgangskode" autocomplete="new-password" required />
      </div>

      <button id="submit-btn" type="submit">Aktivér konto</button>
    </form>

    <div id="status" class="status"></div>

    <p class="small">
      Når kontoen er aktiveret, bliver du sendt tilbage til forsiden.
    </p>
  </section>

  <script>
    const form = document.getElementById('invite-form');
    const statusBox = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');

    function setStatus(message, type = 'info') {
      statusBox.textContent = message;
      statusBox.className = 'status show ' + type;
    }

    function getInviteToken() {
      const url = new URL(window.location.href);

      const hashParams = new URLSearchParams((url.hash || '').replace(/^#/, ''));
      const queryParams = url.searchParams;

      return (
        hashParams.get('invite_token') ||
        queryParams.get('invite_token') ||
        hashParams.get('confirmation_token') ||
        queryParams.get('confirmation_token') ||
        hashParams.get('token') ||
        queryParams.get('token')
      );
    }

    async function activateInvite(token, password) {
      const response = await fetch('/.netlify/identity/verify', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          token,
          password,
          type: 'signup'
        })
      });

      const raw = await response.text();

      let data = {};
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch {
        data = { error: raw || 'Ukendt fejl' };
      }

      if (!response.ok) {
        throw new Error(
          data.msg ||
          data.error ||
          data.message ||
          'Kunne ikke aktivere konto'
        );
      }

      return data;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const token = getInviteToken();
      const password = document.getElementById('password').value.trim();
      const password2 = document.getElementById('password2').value.trim();

      if (!token) {
        setStatus('Ingen invitationstoken fundet i linket.', 'error');
        return;
      }

      if (password.length < 8) {
        setStatus('Adgangskoden skal være mindst 8 tegn.', 'error');
        return;
      }

      if (password !== password2) {
        setStatus('Adgangskoderne matcher ikke.', 'error');
        return;
      }

      try {
        submitBtn.disabled = true;
        setStatus('Aktiverer konto...', 'info');

        await activateInvite(token, password);

        setStatus('Konto aktiveret. Du bliver sendt til forsiden...', 'success');

        setTimeout(() => {
          window.location.href = '/';
        }, 1400);
      } catch (err) {
        setStatus(err?.message || 'Kunne ikke aktivere konto.', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    window.addEventListener('load', () => {
      const token = getInviteToken();

      if (!token) {
        setStatus('Invite-linket mangler token.', 'error');
      } else {
        setStatus('Invitation fundet. Vælg adgangskode for at fortsætte.', 'info');
      }
    });
  </script>
</body>
</html>
