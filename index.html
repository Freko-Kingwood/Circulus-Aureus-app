<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulus Aureus</title>
  <meta name="theme-color" content="#2b0f16" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#18060c;
      --panel:#2b0d16;
      --panel2:#3d1320;
      --gold:#d7b56c;
      --text:#f7efe6;
      --muted:#d9cec2;
      --line:rgba(215,181,108,.22);
      --glow:rgba(215,181,108,.18);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:Inter,system-ui,sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(124,25,45,.40), transparent 35%),
        linear-gradient(180deg,#15040a 0%,#0e0206 100%);
    }
    .hidden{display:none!important}
    .shell{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:28px 18px;
    }
    .panel{
      width:min(100%,760px);
      background:linear-gradient(180deg, rgba(70,17,31,.94), rgba(33,8,15,.97));
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:0 20px 60px rgba(0,0,0,.35), 0 0 40px var(--glow) inset;
      padding:34px 22px;
      text-align:center;
    }
    .crest{
      width:190px;
      max-width:55vw;
      display:block;
      margin:0 auto 18px;
      border-radius:999px;
    }
    .eyebrow{
      margin:0 0 12px;
      color:var(--gold);
      font-family:Cinzel,serif;
      letter-spacing:.04em;
      font-size:14px;
    }
    h1,h2{margin:0;font-family:Cinzel,serif}
    h1{
      font-size:clamp(42px,8vw,74px);
      line-height:1.04;
      margin-bottom:18px;
    }
    p.copy{
      margin:0 auto 28px;
      max-width:560px;
      color:var(--muted);
      font-size:clamp(18px,3.2vw,22px);
      line-height:1.55;
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:16px;
      margin-bottom:18px;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:16px 30px;
      cursor:pointer;
      font-family:Cinzel,serif;
      font-size:18px;
      transition:.2s transform ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:var(--gold);
      color:#2a180b;
      box-shadow:0 0 28px rgba(215,181,108,.24);
    }
    .btn-secondary{
      color:var(--text);
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
    }
    .box{
      margin-top:18px;
      padding:18px;
      text-align:left;
      background:linear-gradient(180deg, rgba(76,19,34,.88), rgba(46,12,23,.94));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:0 0 24px rgba(215,181,108,.12);
    }
    .stack{display:grid;gap:14px}
    input,textarea{
      width:100%;
      padding:16px 18px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--text);
      font:inherit;
    }
    textarea{min-height:120px;resize:vertical}
    .status{
      display:inline-flex;
      align-items:center;
      gap:12px;
      margin-top:16px;
      padding:12px 22px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      max-width:100%;
      text-align:left;
    }
    .dot{
      width:14px;height:14px;border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 0 4px rgba(215,181,108,.14);
      flex:0 0 auto;
    }
    .note{
      margin-top:18px;
      color:var(--muted);
      line-height:1.55;
      font-size:15px;
    }
    .app{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:28px 18px;
    }
    .app-card{
      width:min(100%,760px);
      background:linear-gradient(180deg, rgba(70,17,31,.94), rgba(33,8,15,.97));
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:0 20px 60px rgba(0,0,0,.35), 0 0 40px var(--glow) inset;
      padding:30px 22px;
    }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }
    .pill{
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 18px;
      background:rgba(255,255,255,.03);
    }
    .success{
      margin-top:16px;
      color:var(--gold);
      font-family:Cinzel,serif;
      font-size:18px;
    }
  </style>
</head>
<body>
  <div id="auth-shell" class="shell">
    <section class="panel">
      <img src="/assets/crest.jpeg" alt="Circulus Aureus våbenskjold" class="crest" />

      <p class="eyebrow">CIRCULUS AUREUS</p>
      <h1>DET DIGITALE<br>LOGERUM</h1>
      <p class="copy">
        Privat medlemsplatform til begivenheder, referater, medlemmer og interne beskeder.
      </p>

      <div class="actions">
        <button id="open-login" class="btn btn-primary" type="button">LOG IND</button>
        <button id="open-request" class="btn btn-secondary" type="button">ANMOD OM ADGANG</button>
      </div>

      <section id="login-box" class="box hidden">
        <p class="eyebrow">Log ind</p>
        <form id="login-form" class="stack">
          <input name="email" type="email" placeholder="Din e-mail" required />
          <input name="password" type="password" placeholder="Password" required />
          <button class="btn btn-primary" type="submit">Log ind</button>
        </form>
      </section>

      <section id="request-box" class="box hidden">
        <p class="eyebrow">Anmod om adgang</p>
        <form id="request-access-form" class="stack">
          <input name="name" placeholder="Dit navn" required />
          <input name="email" type="email" placeholder="Din e-mail" required />
          <textarea name="note" placeholder="Kort besked (valgfrit)"></textarea>
          <button class="btn btn-primary" type="submit">Send anmodning</button>
        </form>
      </section>

      <div class="status">
        <span class="dot"></span>
        <span id="identity-status">Afventer login</span>
      </div>

      <p class="note">
        Invite-linket fra e-mail skal automatisk behandles på denne side.
      </p>
    </section>
  </div>

  <div id="app-shell" class="app hidden">
    <section class="app-card">
      <div class="row">
        <div>
          <p class="eyebrow">PRIVAT OMRÅDE</p>
          <h2>Du er logget ind</h2>
        </div>
        <div id="role-pill" class="pill">Medlem</div>
      </div>

      <p class="success">Adgang godkendt.</p>

      <div style="margin-top:18px">
        <strong id="profile-name">Medlem</strong><br>
        <span id="profile-email">-</span>
      </div>

      <div style="margin-top:22px">
        <button id="logout-btn" class="btn btn-secondary" type="button">Log ud</button>
      </div>
    </section>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
