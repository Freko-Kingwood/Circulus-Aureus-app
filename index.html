<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulus Aureus</title>

  <meta name="theme-color" content="#2b0f16" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <!-- 🔥 VIGTIG -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>

  <!-- BAGGRUND -->
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <!-- LOGIN SCREEN -->
  <div id="auth-shell" class="auth-shell">

    <div class="login-panel glass">

      <div class="crest-wrap">
        <img src="assets/crest.jpeg" alt="Circulus Aureus våbenskjold" class="crest" />
      </div>

      <p class="eyebrow">Circulus Aureus</p>
      <h1>Det digitale logerum</h1>

      <p class="login-copy">
        Privat medlemsplatform til begivenheder, referater, medlemmer og interne beskeder.
      </p>

      <!-- KNAPPER -->
      <div class="login-actions">
        <button id="open-login" class="btn btn-primary" type="button">
          Log ind
        </button>

        <button id="open-request" class="btn btn-secondary" type="button">
          Anmod om adgang
        </button>
      </div>

      <!-- REQUEST BOX -->
      <div id="request-box" class="card glass hidden" style="margin-top:18px;">
        <p class="eyebrow">Anmod om adgang</p>

        <form id="request-access-form" class="form-stack">
          <input name="name" placeholder="Dit navn" required />
          <input name="email" type="email" placeholder="Din e-mail" required />
          <textarea name="note" placeholder="Kort besked (valgfrit)"></textarea>

          <button class="btn btn-primary" type="submit">
            Send anmodning
          </button>
        </form>
      </div>

      <!-- STATUS -->
      <div class="status-card">
        <span class="status-dot"></span>
        <span id="identity-status">Afventer login</span>
      </div>

      <p class="login-note">
        Login kører via Netlify Identity. Admin låses op via e-mail.
      </p>

    </div>
  </div>

  <!-- APP -->
  <div id="app-shell" class="app-shell hidden">
    <h1 style="text-align:center; margin-top:40px;">
      Velkommen til Circulus Aureus
    </h1>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- SCRIPT -->
  <script src="app.js"></script>

</body>
</html>
