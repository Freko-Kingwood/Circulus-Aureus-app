<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Circulus Aureus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#120409;
  color:white;
}

.hidden{display:none}

.app{padding-bottom:80px}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:#1f0a12;
  padding:10px;
}

.nav button{
  background:none;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div id="auth-shell">
  <h1>Circulus Aureus</h1>
  <button id="open-login">Log ind</button>

  <form id="login-form" class="hidden">
    <input name="email">
    <input name="password" type="password">
    <button>Login</button>
  </form>

  <form id="request-access-form">
    <input name="name">
    <input name="email">
    <button>Anmod</button>
  </form>

  <div id="invite-box" class="hidden">
    <form id="invite-form">
      <input name="password" type="password">
      <input name="password2" type="password">
      <button>Aktivér</button>
    </form>
  </div>

  <div id="identity-status"></div>
</div>

<div id="app-shell" class="app hidden">

  <div id="view-dashboard">Dashboard</div>
  <div id="view-events" class="hidden">Events</div>
  <div id="view-members" class="hidden">Members</div>
  <div id="view-messages" class="hidden">Messages</div>
  <div id="view-admin" class="hidden">Admin</div>

  <div class="nav">
    <button data-view="dashboard">Home</button>
    <button data-view="events">Events</button>
    <button data-view="members">Members</button>
    <button data-view="messages">Msg</button>
    <button data-view="admin">Admin</button>
  </div>

</div>

<script type="module" src="/app.js"></script>
</body>
</html>
