<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulus Aureus</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<!-- LOGIN -->
<div id="auth-shell">
  <h1>Circulus Aureus</h1>

  <button id="open-login">Log ind</button>
  <button id="open-request">Anmod om adgang</button>

  <div id="login-box" class="hidden">
    <form id="login-form">
      <input name="email" type="email" placeholder="Email" required />
      <input name="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
  </div>

  <div id="request-box" class="hidden">
    <form id="request-access-form">
      <input name="name" placeholder="Navn" required />
      <input name="email" type="email" placeholder="Email" required />
      <button type="submit">Send</button>
    </form>
  </div>

  <p id="identity-status">Ikke logget ind</p>
</div>

<!-- APP -->
<div id="app-shell" class="hidden">
  <h2>Du er logget ind</h2>
  <button id="logout-btn">Log ud</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
