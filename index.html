<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Circulus Aureus</title>

  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>

  <!-- LOGIN -->
  <section id="view-login" class="center">
    <img src="/assets/crest.jpeg" class="crest" />

    <p class="eyebrow">Circulus Aureus</p>
    <h1>DET DIGITALE LOGERUM</h1>

    <p class="muted">
      Privat medlemsplatform til begivenheder, medlemmer og interne beskeder.
    </p>

    <button id="login-btn" class="btn primary">LOG IND</button>
  </section>

  <!-- APP -->
  <div id="app" class="hidden">

    <header class="hero">
      <p class="eyebrow">Privat område</p>
      <h2>DASHBOARD</h2>
      <span id="user-role" class="pill">Medlem</span>
    </header>

    <section id="view-home" class="view active">
      <div class="card">0<br><span>Begivenheder</span></div>
      <div class="card">0<br><span>Medlemmer</span></div>
      <div class="card">0<br><span>Beskeder</span></div>
    </section>

    <section id="view-profile" class="view">
      <div class="card">
        <p class="eyebrow">Profil</p>
        <h3 id="user-name"></h3>
        <p id="user-email"></p>
        <button id="logout-btn" class="btn secondary">LOG UD</button>
      </div>
    </section>

    <nav class="bottom-nav">
      <button data-view="home" class="nav-item active">Hjem</button>
      <button data-view="profile" class="nav-item">Profil</button>
    </nav>

  </div>

  <script src="app.js"></script>

</body>
</html>
