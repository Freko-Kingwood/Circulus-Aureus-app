<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circulus Aureus</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- LOGIN SCREEN -->
  <div id="auth-shell" class="auth-shell">
    <div class="login-panel glass">

      <div class="crest-wrap">
        <img src="assets/crest.jpeg" alt="Circulus Aureus våbenskjold" />
      </div>

      <p class="eyebrow">Circulus Aureus</p>
      <h1>Det digitale logerum</h1>
      <p class="login-copy">
        Privat medlemsplatform til begivenheder, referater og beskeder.
      </p>

      <div class="login-actions">
        <button id="open-login" class="btn btn-primary">
          Log ind
        </button>
      </div>

      <div class="status-card">
        <span id="identity-status">Afventer login</span>
      </div>

    </div>
  </div>

  <!-- APP (SKJULT INDTIL LOGIN) -->
  <div id="app-shell" class="hidden">

    <main>

      <!-- PROFIL -->
      <section>
        <article class="card glass">
          <p class="eyebrow">Profil</p>
          <h3>Du er logget ind</h3>
          <p id="identity-status"></p>

          <button id="logout-btn" class="btn btn-secondary">
            🚪 Log ud
          </button>
        </article>
      </section>

    </main>

  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- 🔥 VIGTIG: MODULE SCRIPT -->
  <script type="module" src="app.js"></script>

</body>
</html>
